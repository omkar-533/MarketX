services:
  - type: web
    name: marketx-api
    runtime: node
    region: singapore
    plan: free
    autoDeploy: true
    
    buildCommand: npm ci && npm run build
    startCommand: node server.mjs
    
    healthCheckPath: /api/health
    healthCheckInterval: 30
    
    envVars:
      # === Node Environment ===
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      
      # === Fyers API Configuration ===
      # ⚠️ USER MUST SET THESE in Render Dashboard:
      - key: FYERS_APP_ID
        sync: false
      - key: FYERS_SECRET_KEY
        sync: false
      - key: FYERS_REDIRECT_URI
        sync: false  # https://YOUR-SERVICE.onrender.com/api/auth/fyers/callback
      
      # === URLs (single Render deploy: use same URL for all three) ===
      - key: FRONTEND_URL
        sync: false  # https://YOUR-SERVICE.onrender.com
      - key: API_PUBLIC_URL
        sync: false  # https://YOUR-SERVICE.onrender.com
      - key: CORS_ORIGINS
        sync: false  # https://YOUR-SERVICE.onrender.com,http://localhost:5173
      - key: COOKIE_SECURE
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      
      # === Market Data ===
      - key: MARKET_PROVIDER
        value: fyers
      - key: MARKET_LIVE
        value: "true"
      
      # === Fyers Auto-Connect (Optional) ===
      # After first login: run `node scripts/extract-fyers-token.mjs` locally
      # Then paste token here for auto-connect without manual login
      - key: FYERS_ACCESS_TOKEN
        sync: false
      
      # === Optional: AI Services ===
      - key: OPENROUTER_API_KEY
        sync: false
      
      # === Logging ===
      - key: LOG_LEVEL
        value: info

    # Token persistence on free plan: set FYERS_ACCESS_TOKEN after first OAuth login.
    # Paid plan: add a disk mounted at /opt/render/project/src/data in the dashboard.
