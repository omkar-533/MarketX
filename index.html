<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Master TradeX - Professional Options Trading Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      (function () {
        var t = localStorage.getItem('tradeflow_theme');
        var mode = t === 'light' ? 'light' : 'dark';
        var root = document.documentElement;
        root.setAttribute('data-theme', mode);
        root.classList.remove('theme-dark', 'theme-light');
        root.classList.add(mode === 'light' ? 'theme-light' : 'theme-dark');
        root.style.colorScheme = mode;
      })();
    </script>
    <div id="root">
      <div id="boot-fallback" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0e17;color:#94a3b8;font-family:Inter,system-ui,sans-serif;font-size:14px">
        Loading Master TradeX…
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
